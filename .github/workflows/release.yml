name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared-types
        run: pnpm --filter @umbra/shared-types build

      - name: Verify shared-types dist
        shell: bash
        run: |
          ls -la packages/shared-types/dist/ 2>&1 || echo "WARN: dist not found"

      - name: Build server
        run: pnpm --filter @umbra/server build

      - name: Build web
        run: pnpm --filter @umbra/web build

      - name: Build desktop
        run: pnpm --filter @umbra/desktop build

      - name: Publish release
        run: pnpm --filter @umbra/desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
