name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared-types
        working-directory: packages/shared-types
        shell: bash
        run: |
          echo "--- tsc version ---"
          npx tsc --version
          echo "--- source files ---"
          ls -la src/
          echo "--- running tsc ---"
          npx tsc --listEmittedFiles
          echo "--- dist contents ---"
          ls -la dist/ || echo "WARN: dist dir not found after build"

      - name: Verify shared-types dist
        shell: bash
        run: |
          test -f packages/shared-types/dist/index.d.ts || { echo "ERROR: packages/shared-types/dist/index.d.ts not found"; exit 1; }
          echo "OK: shared-types dist verified"
          ls -la packages/shared-types/dist/

      - name: Build server
        run: pnpm --filter @umbra/server build

      - name: Build web
        run: pnpm --filter @umbra/web build

      - name: Build desktop
        run: pnpm --filter @umbra/desktop build

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('apps/desktop/package.json','utf8')); p.version='$VERSION'; fs.writeFileSync('apps/desktop/package.json', JSON.stringify(p,null,2)+'\n');"
          echo "Version set to $VERSION"

      - name: Publish release
        run: pnpm --filter @umbra/desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
